<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Arial, sans-serif; width: 380px; padding: 14px; background: #1a1a1a; color: #eee; margin: 0; }
  h3 { margin: 0 0 6px 0; color: #00ff88; }
  .subtitle { font-size: 11px; color: #888; margin-bottom: 10px; }
  button { width: 100%; padding: 10px; background: #00ff88; color: #000; border: 0; border-radius: 6px; font-weight: 900; font-size: 14px; cursor: pointer; margin-bottom: 6px; }
  button:hover { background: #00cc66; }
  button.secondary { background: #333; color: #00ff88; border: 1px solid #00ff88; }
  button.off { background: #333; color: #888; border: 1px solid #555; }
  button.danger { background: #ff4444; color: #fff; }
  .info { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.5; }
  kbd { background: #333; padding: 2px 6px; border-radius: 3px; color: #00ff88; font-family: monospace; font-size: 11px; }
  #status { margin-top: 8px; padding: 8px; background: #222; border-radius: 4px; font-size: 11px; min-height: 18px; max-height: 320px; overflow: auto; white-space: pre-wrap; font-family: monospace; }
  .ok { color: #00ff88; }
  .err { color: #ff4444; }
  .warn { color: #ffaa00; font-size: 11px; margin: 6px 0; padding: 6px; background: #2a1f00; border: 1px solid #ffaa00; border-radius: 4px; }
  .danger-warn { color: #ff6666; font-size: 11px; margin: 6px 0; padding: 6px; background: #2a0000; border: 1px solid #ff4444; border-radius: 4px; }
</style>
</head>
<body>
  <h3>♟️ Chess Advisor</h3>
  <div class="subtitle">chess.com edition</div>
  <div class="danger-warn">⚠️ chess.com has anti-cheat detection. Auto-play in particular is risky and may get your account banned.</div>
  <button id="autoToggle">⏳ Loading…</button>
  <button id="autoplayToggle">⏳ Loading…</button>
  <button id="premoveToggle">⏳ Loading…</button>
  <div id="autoplayWarning" class="warn" style="display:none;">⚠️ Auto-play active. Use only on practice/test accounts.</div>
  <button id="getMove" class="secondary">🎯 Get Move Now (manual)</button>
  <button id="runDiag" class="secondary">🔬 Run Diagnostics</button>
  <button id="checkServer" class="secondary">Check Stockfish Server</button>
  <div id="status">Ready</div>
  <div class="info">
    Hotkey: <kbd>Ctrl+Shift+B</kbd> for manual request.
  </div>
  <script src="popup.js"></script>
</body>
</html>
