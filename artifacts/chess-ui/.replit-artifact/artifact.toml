kind = "web"
previewPath = "/"
title = "Chess Research UI"
version = "1.0.0"
id = "artifacts/chess-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25086

[services.development]
run = "pnpm --filter @workspace/chess-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chess-ui", "run", "build" ]
publicDir = "artifacts/chess-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25086"
BASE_PATH = "/"
